---
layout: default
---

<div class="home">
  <h2>Latest posts</h2>
  <ul class="post-list">
  {%- for post in site.posts -%}
    <li>
      <time>{{ post.date | date: "%Y-%m-%d" }}</time>
      - <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
    </li>
  {%- endfor -%}
  </ul>

  <p class="rss-subscribe">subscribe <a href="{{ "/feed.xml" | relative_url }}">via RSS</a></p>
</div>
